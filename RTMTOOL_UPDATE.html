<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LinKey - Galeria de Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* container principal */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4d9eff, #1a5bbf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0, 30, 80, 0.3);
        }

        .sub {
            color: #8a9bcf;
            font-size: 1rem;
            margin-top: 0.3rem;
            font-weight: 400;
        }

        /* barra de pesquisa */
        .search-section {
            max-width: 550px;
            margin: 0 auto 2.5rem auto;
        }

        .search-wrapper {
            background: #111827;
            border-radius: 60px;
            padding: 0.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid #1e2a44;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #0b0f18;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(2px);
        }

        .search-icon {
            color: #3b6cb0;
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }

        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 0;
            font-size: 1rem;
            color: #eef2ff;
            outline: none;
        }

        #searchInput::placeholder {
            color: #4b5a7c;
            font-weight: 400;
        }

        .clear-search {
            background: none;
            border: none;
            color: #6a7c9f;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            display: none;
            transition: color 0.2s;
        }

        .clear-search:hover {
            color: #ffffff;
        }

        /* contador de resultados */
        .result-stats {
            text-align: center;
            color: #7e8db0;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            font-weight: 500;
        }

        /* grade de cards (galeria) */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        /* card estilo clean */
        .card {
            background: #0f1420e6;
            backdrop-filter: blur(2px);
            border-radius: 28px;
            overflow: hidden;
            transition: all 0.25s ease;
            border: 1px solid #1f2a46;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: #2e4a7c;
            box-shadow: 0 20px 30px -12px #00000080;
            background: #111724f2;
        }

        /* área da imagem */
        .card-img {
            width: 100%;
            height: 180px;
            background: #080c14;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid #1f2a46;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.02);
        }

        .fallback-icon {
            color: #2e4b7c;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #0b1020;
        }

        /* conteúdo do card */
        .card-content {
            padding: 1.2rem 1rem 1.4rem 1rem;
        }

        .link-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #eef3ff;
            margin-bottom: 1rem;
            word-break: break-word;
            line-height: 1.3;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #0f2b4f;
            width: 100%;
            padding: 0.75rem 0;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            color: #c7e2ff;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
            background: linear-gradient(95deg, #132c48, #0a1e36);
            border: 1px solid #2a4870;
        }

        .download-btn:hover {
            background: #1e3e64;
            color: white;
            border-color: #3f74ae;
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(0, 30, 80, 0.6);
        }

        /* mensagem quando nenhum resultado */
        .no-results {
            text-align: center;
            padding: 3rem;
            background: #0c1120cc;
            border-radius: 48px;
            color: #98a9cf;
            font-size: 1.1rem;
            border: 1px dashed #2a3a60;
            margin-top: 2rem;
        }

        /* rodapé sutil */
        .footer {
            text-align: center;
            margin-top: 3.5rem;
            font-size: 0.75rem;
            color: #3e506e;
        }

        /* responsivo */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .logo {
                font-size: 2.4rem;
            }
            .gallery {
                gap: 1.2rem;
            }
            .link-name {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">LinKey</div>
        <div class="sub">Galeria inteligente · organize e compartilhe links</div>
    </div>

    <div class="search-section">
        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Pesquisar por nome do link..." autocomplete="off">
                <button class="clear-search" id="clearSearchBtn" aria-label="Limpar">✖</button>
            </div>
        </div>
        <div class="result-stats" id="resultStats"></div>
    </div>

    <div id="galleryContainer" class="gallery">
        <!-- cards serão inseridos via JS -->
    </div>

    <div class="footer">
        LinKey — Todos os links redirecionam para seus respectivos destinos
    </div>
</div>

<script>
    // ----------------------------- BASE DE DADOS (links + imagens + nomes) -----------------------------
    // Cada objeto: nome do link, url de download (redirecionamento), imagem (url da foto)
    // Para demonstração, coloquei exemplos variados. Você pode editar, adicionar ou remover.
    const linksData = [
        {
            nome: "GitHub Oficial",
            url: "https://github.com",
            imagem: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
        },
        {
            nome: "Unsplash - Fotos Grátis",
            url: "https://unsplash.com",
            imagem: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400&h=250&fit=crop"
        },
        {
            nome: "Freepik Recursos",
            url: "https://www.freepik.com",
            imagem: "https://img.freepik.com/iconos-gratis/descargar_318-418870.jpg?w=200"
        },
        {
            nome: "Google Drive",
            url: "https://drive.google.com",
            imagem: "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png"
        },
        {
            nome: "Documentação React",
            url: "https://react.dev",
            imagem: "https://cdn.worldvectorlogo.com/logos/react-2.svg"
        },
        {
            nome: "Tailwind CSS",
            url: "https://tailwindcss.com",
            imagem: "https://tailwindcss.com/_next/static/media/tailwindcss-mark.79614a5f61617ba49a0891494521226b.svg"
        },
        {
            nome: "Figma Community",
            url: "https://figma.com",
            imagem: "https://cdn.worldvectorlogo.com/logos/figma-1.svg"
        },
        {
            nome: "Spotify Web Player",
            url: "https://open.spotify.com",
            imagem: "https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_Green.png"
        },
        {
            nome: "Netflix",
            url: "https://netflix.com",
            imagem: "https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2023.ico?w=200"
        }
    ];

    // Função auxiliar para garantir que a imagem carregue ou fallback
    function handleImageError(imgElement) {
        imgElement.onerror = null; // evita loop
        imgElement.style.display = "none";
        const fallbackSpan = document.createElement("span");
        fallbackSpan.className = "fallback-icon";
        fallbackSpan.innerHTML = "🖼️";
        const parent = imgElement.parentNode;
        parent.appendChild(fallbackSpan);
    }

    // renderizar a galeria baseada no termo de busca
    function renderGallery(searchTerm = "") {
        const container = document.getElementById("galleryContainer");
        const statsDiv = document.getElementById("resultStats");
        
        let filtered = [...linksData];
        if (searchTerm.trim() !== "") {
            const term = searchTerm.trim().toLowerCase();
            filtered = linksData.filter(item => item.nome.toLowerCase().includes(term));
        }
        
        // atualizar contagem
        const total = filtered.length;
        const totalOriginal = linksData.length;
        if (searchTerm.trim() === "") {
            statsDiv.innerHTML = `${total} link${total !== 1 ? 's' : ''} disponível`;
        } else {
            statsDiv.innerHTML = `${total} resultado${total !== 1 ? 's' : ''} para “${escapeHtml(searchTerm)}” (de ${totalOriginal})`;
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results">🔎 Nenhum link encontrado. Tente outro nome.</div>`;
            return;
        }
        
        // gerar os cards
        let cardsHTML = "";
        for (let item of filtered) {
            // cada card contém: imagem (url externa), nome do link, botão que redireciona para item.url
            // tratamento de imagem com fallback via JS (onerror)
            cardsHTML += `
                <div class="card" data-nome="${escapeHtml(item.nome)}">
                    <div class="card-img">
                        <img 
                            src="${escapeHtml(item.imagem)}" 
                            alt="${escapeHtml(item.nome)}" 
                            loading="lazy"
                            onerror="handleImageError(this)"
                        >
                    </div>
                    <div class="card-content">
                        <div class="link-name">${escapeHtml(item.nome)}</div>
                        <button class="download-btn" data-url="${escapeHtml(item.url)}">
                            ⬇️ Baixar / Acessar
                        </button>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = cardsHTML;
        
        // depois de inserir, atrelar eventos de clique nos botões
        const allButtons = document.querySelectorAll(".download-btn");
        allButtons.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.preventDefault();
                const targetUrl = btn.getAttribute("data-url");
                if (targetUrl) {
                    // redireciona para o link desejado
                    window.open(targetUrl, "_blank", "noopener,noreferrer");
                } else {
                    console.warn("URL inválida");
                }
            });
        });
    }
    
    // utilitário para evitar XSS
    function escapeHtml(str) {
        if (!str) return "";
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }
    
    // função de pesquisa dinâmica
    function setupSearch() {
        const searchInput = document.getElementById("searchInput");
        const clearBtn = document.getElementById("clearSearchBtn");
        
        function updateSearch() {
            const query = searchInput.value;
            renderGallery(query);
            // mostrar botão limpar se houver texto
            if (query.trim().length > 0) {
                clearBtn.style.display = "block";
            } else {
                clearBtn.style.display = "none";
            }
        }
        
        searchInput.addEventListener("input", updateSearch);
        clearBtn.addEventListener("click", () => {
            searchInput.value = "";
            updateSearch();
            searchInput.focus();
        });
        
        // inicializar com todos links
        updateSearch();
    }
    
    // garantir que handleImageError seja global para o onerror
    window.handleImageError = handleImageError;
    
    // iniciar tudo quando o DOM estiver pronto
    document.addEventListener("DOMContentLoaded", () => {
        setupSearch();
    });
</script>
</body>
</html>
