  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=sv0RWprBydaP_SxtwioInfB0W2_FhiDfi0pvebNTDrIn4-br3n13SQbHnAO9ioCQ6emHYiY36Xq_L25Fzk2rcq6eeiI9bQRVk39oWWcGqAofAFtHdrBzptXtbRaYWqZqaML2avqXVIqBxULHJzv8uMxqQQN4UFhs9Q8DiPs21LHCRqOiWYoiLdPb8KTASFJBXUaGl2Vc_GK0R4rIiXbO_wKvEJsEyaPuJkIiYEEmSVyqGflmKWjUXvLlBW19Lx-WoOr1YWpqHvp0vXTKMjGv29_tqLFdJSXhvp9Vh4Eji-I" charset="UTF-8"></script><style>
    :root{
      --bg1:#07130a;
      --bg2:#0b2a19;
      --accent:#9bff5a;
      --accent-2:#7a3bd6;
      --card:#0f1f16;
      --muted:#cfd8cc;
      --button-bg:#18a34a;
      --button-bg-dark:#117838;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg,var(--bg1),var(--bg2));
      color:#e9f8ea;
      -webkit-font-smoothing:antialiased;
    }
    header{
      text-align:center;
      padding:18px 10px;
      font-weight:700;
      font-size:20px;
      color:var(--accent-2);
      background:linear-gradient(90deg, rgba(0,0,0,0.25), rgba(0,0,0,0.05));
      border-bottom:3px solid rgba(0,0,0,0.4);
    }
    .container{
      max-width:980px;
      margin:18px auto;
      padding:12px;
    }
    .section{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));
      border:1px solid rgba(155,255,90,0.08);
      padding:12px;
      border-radius:10px;
      margin-bottom:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.45);
    }
    .section-title{
      text-align:center;
      color:var(--accent);
      font-weight:700;
      font-size:18px;
      margin-bottom:10px;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .btn{
      background:var(--button-bg);
      border:none;
      color:#04210a;
      padding:12px 14px;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
      min-width:150px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.35);
      transition:transform .08s ease, opacity .12s;
    }
    .btn:hover{transform:translateY(-2px)}
    .btn.small{min-width:90px;padding:8px 10px;font-size:13px}
    .btn.toggle-btn{background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#02210a}
    .btn.btn-off{background:#2b2b2b;color:#eaeaea}
    input[type="text"], textarea, select{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:2px solid rgba(155,255,90,0.08);
      background:#06160e;
      color:var(--muted);
      font-weight:600;
    }
    textarea{min-height:120px; resize:vertical}
    .connection-form{max-width:420px;margin:0 auto 6px}
    #status{font-size:13px;text-align:center;color:var(--muted);margin-top:8px}
    .muted{color:var(--muted);font-size:13px;text-align:center;}
    footer{font-size:12px;color:#98bfa1;text-align:center;margin-top:6px}
    @media (max-width:600px){
      .btn{min-width:120px}
    }
  </style>

  <script>
    /* Script original preservado */
    function setCookie(name, value, days) {
      let expires = "";
      if (days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + date.toUTCString();
      }
      document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }
    function getCookie(name) {
      const nameEQ = name + "=";
      const ca = document.cookie.split(';');
      for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) === ' ') c = c.substring(1);
        if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length);
      }
      return null;
    }
    async function fetchWithTimeout(url, timeout = 3000) {
      try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(url, { signal: controller.signal }).catch(() => null);
        clearTimeout(id);
        return response;
      } catch (e) { return null; }
    }
    let currentIP = "";
    const ipInput = document.getElementById("ip");
    const statusEl = document.getElementById("status");
    const savedIP = localStorage.getItem("lastPS3IP") || getCookie("ps3_ip");
    const savedIpLabel = document.getElementById("savedIpLabel");
    if (savedIP) {
      ipInput.value = savedIP;
      savedIpLabel.innerText = "Último IP usado: " + savedIP;
    }
    async function connectPS3() {
      currentIP = ipInput.value.trim();
      if (!currentIP) { alert("Digite o IP do PS3"); return; }
      localStorage.setItem("lastPS3IP", currentIP);
      setCookie("ps3_ip", currentIP, 30);
      statusEl.innerText = "Conectado a: " + currentIP;
      try {
        await fetchWithTimeout(`http://${currentIP}/beep.ps3?1`);
        await fetchWithTimeout(`http://${currentIP}/popup.ps3/RTM Conectado - RTZ_GW Xd`);
      } catch (e) {}
    }
    function disconnectPS3() {
      currentIP = "";
      statusEl.innerText = "Status: Desconectado";
    }
    async function send(addr, val) {
      if (!currentIP) { alert("Digite o IP do PS3"); return; }
      addr = addr.replace(/[^0-9A-Fa-f]/g, '').toUpperCase();
      val = String(val).replace(/\s+/g, '');
      const url = `http://${currentIP}/setmem.ps3mapi?addr=${addr}&val=${val}`;
      await fetchWithTimeout(url);
    }
    async function sendMultiple(pairs) {
      for (const [addr, val] of pairs) {
        await send(addr, val);
        await delay(120);
      }
    }
    async function sendCommand(path) {
      if (!currentIP) { alert("Digite o IP do PS3"); return; }
      await fetchWithTimeout(`http://${currentIP}${path}`);
    }
    function delay(ms) { return new Promise(res => setTimeout(res, ms)); }
    async function toggleMod(button) {
      const isOn = button.classList.contains("on");
      const prefix = isOn ? "off" : "on";
      const pairs = [];
      let index = 0;
      while (button.dataset[`${prefix}${index}addr`] !== undefined) {
        const addr = button.dataset[`${prefix}${index}addr`];
        const val = button.dataset[`${prefix}${index}val`];
        pairs.push([addr, val]);
        index++;
      }
      await sendMultiple(pairs);
      if (isOn) {
        button.classList.remove("on","btn-off");
        button.innerText = button.innerText.replace(/: ON/i, ": OFF");
      } else {
        button.classList.add("on","btn-off");
        button.innerText = button.innerText.replace(/: OFF/i, ": ON");
      }
    }
    function runNetcheat() {
      if (!currentIP) { alert("Digite o IP do PS3"); return; }
      const lines = document.getElementById("netcheatInput").value.trim().split("\n");
      for (let raw of lines) {
        const line = raw.trim();
        if (!line) continue;
        const parts = line.split(/\s+/);
        if (parts.length < 3) continue;
        const type = parts[0];
        const offset = parts[1];
        let value = parts.slice(2).join(" ");
        if (type === "0") send(offset, value.toUpperCase());
        else if (type === "1") send(offset, textToHex(value));
        else if (type === "2") {
          const n = parseFloat(value);
          if (!isNaN(n)) send(offset, floatToHex(n));
        }
      }
    }
    function clearNetcheat(){ document.getElementById("netcheatInput").value = ""; }
    function textToHex(str) {
      return str.split('').map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join('').toUpperCase();
    }
    function floatToHex(f) {
      const buf = new ArrayBuffer(4);
      new DataView(buf).setFloat32(0, f);
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
    }
  </script>
