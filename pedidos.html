<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinKey - Feed</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark">
<div class="container">
    <div class="header">
        <div class="logo">LinKey</div>
        <div class="sub">feed da comunidade</div>
    </div>

    <div class="user-info" id="userInfo">
        <span class="user-email" id="userEmail">carregando...</span>
        <div>
            <button id="loginBtn" class="login-btn" onclick="abrirLogin()">entrar</button>
            <button id="logoutBtn" class="logout-btn" style="display:none" onclick="fazerLogout()">sair</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn" onclick="window.location.href='index.html'">links</button>
        <button class="tab-btn active">feed</button>
        <button class="tab-btn admin-only" id="adminTabBtn" style="display:none" onclick="window.location.href='admin.html'">admin</button>
    </div>

    <!-- Compositor de post -->
    <div class="feed-composer">
        <textarea id="novoPostTexto" rows="3" placeholder="o que você quer compartilhar?"></textarea>
        <input type="text" id="novoPostUrl" placeholder="link (opcional)">
        <div class="composer-footer">
            <button class="publicar-btn" onclick="publicarPost()">publicar</button>
        </div>
    </div>

    <!-- Feed -->
    <div class="feed-lista" id="feedContainer">
        <div class="no-results">carregando feed...</div>
    </div>

    <!-- Modal Login -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>entrar</h2>
                <span class="close" onclick="fecharModal('loginModal')">&times;</span>
            </div>
            <div class="form-group">
                <label>email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>senha</label>
                <input type="password" id="loginSenha" placeholder="minimo 6 caracteres">
            </div>
            <button onclick="fazerLogin()">entrar</button>
            <button onclick="criarConta()" style="background:#4c9f4f; margin-left:8px;">criar conta</button>
        </div>
    </div>

    <div class="footer">linKey · comunidade de links</div>
</div>

<button class="theme-btn" onclick="alternarTema()">&#127763;</button>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="javascript.js"></script>
</body>
</html>
