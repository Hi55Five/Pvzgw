<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinKey - Comunitário</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        body.dark {
            background: #0a0f1e;
            color: #eef2ff;
        }

        body.light {
            background: #f0f2f5;
            color: #1a1a2e;
        }

        body.light .card {
            background: #ffffff;
            border-color: #d1d5db;
        }

        body.light .card:hover {
            background: #f9fafb;
        }

        body.light .link-name {
            color: #1f2937;
        }

        body.light .search-box {
            background: #ffffff;
            border-color: #d1d5db;
        }

        body.light #searchInput {
            color: #1f2937;
        }

        body.light .result-stats {
            color: #6b7280;
        }

        body.light .footer {
            color: #9ca3af;
        }

        body.light .modal-content {
            background: #ffffff;
            border-color: #d1d5db;
        }

        body.light .form-group input, body.light .form-group textarea {
            background: #f9fafb;
            border-color: #d1d5db;
            color: #1f2937;
        }

        body.light .link-item {
            background: #f9fafb;
            border-color: #e5e7eb;
        }

        body.light .tool-btn, body.light .tab-btn {
            background: #e5e7eb;
            color: #1f2937;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .user-info {
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            background: #0f1420;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        body.light .user-info {
            background: #e5e7eb;
        }

        .user-email {
            font-size: 14px;
        }

        .logout-btn {
            background: #dc2626;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Abas */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1f2a44;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #3b82f6;
        }

        .tab-btn:hover {
            background: #3b82f6;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tool-btn {
            background: #1f2a44;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
        }

        .sort-select {
            background: #111827;
            border: 1px solid #2e4a7c;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
        }

        body.light .sort-select {
            background: white;
            border-color: #d1d5db;
            color: #1f2937;
        }

        .search-section {
            max-width: 500px;
            margin: 0 auto 25px auto;
        }

        .search-box {
            background: #111827;
            border: 1px solid #1e2a44;
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
        }

        .search-icon {
            color: #3b6cb0;
            margin-right: 8px;
        }

        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-size: 16px;
            outline: none;
            color: white;
        }

        body.light #searchInput {
            color: #1f2937;
        }

        .clear-search {
            background: #1e2a44;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            display: none;
        }

        .result-stats {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 300px;
            background: #0f1420;
            border-radius: 20px;
            border: 1px solid #1f2a44;
            overflow: hidden;
            transition: all 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .hot-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ef4444;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: #080c14;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .fallback-icon {
            font-size: 48px;
            color: #3b6cb0;
        }

        .card-content {
            padding: 12px;
        }

        .link-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .link-note {
            font-size: 12px;
            color: #8a9bcf;
            margin-bottom: 8px;
            padding: 6px;
            background: #080c14;
            border-radius: 8px;
        }

        body.light .link-note {
            background: #f3f4f6;
            color: #4b5563;
        }

        .link-cliques {
            font-size: 11px;
            color: #6a7c9f;
            margin-bottom: 10px;
        }

        .card-buttons {
            display: flex;
            gap: 8px;
        }

        .download-btn {
            flex: 2;
            background: #0f2b4f;
            border: 1px solid #2a4870;
            color: #c7e2ff;
            text-align: center;
            padding: 8px 0;
            border-radius: 40px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .share-btn {
            flex: 1;
            background: #1e2a44;
            border: 1px solid #2a4870;
            color: #c7e2ff;
            text-align: center;
            padding: 8px 0;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
        }

        .download-btn:hover, .share-btn:hover {
            background: #3b82f6;
            color: white;
        }

        /* Pedidos */
        .pedido-card {
            background: #0f1420;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #2e4a7c;
        }

        .pedido-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 8px;
        }

        .status-pendente { background: #f59e0b; color: #1a1a2e; }
        .status-aprovado { background: #10b981; color: white; }
        .status-recusado { background: #ef4444; color: white; }

        .admin-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: #0c1120;
            border-radius: 30px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content {
            background: #0f1420;
            margin: 50px auto;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close {
            cursor: pointer;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            background: #080c14;
            border: 1px solid #1e2a44;
            border-radius: 8px;
            font-size: 14px;
            color: white;
        }

        body.light .form-group input, 
        body.light .form-group textarea {
            background: #f9fafb;
            color: #1f2937;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 11px;
            padding: 15px;
        }

        .theme-btn, .admin-btn {
            position: fixed;
            bottom: 20px;
            padding: 12px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .theme-btn {
            left: 20px;
            background: #1f2a44;
            color: white;
        }

        .admin-btn {
            right: 20px;
            background: #3b82f6;
            color: white;
        }

        @media (max-width: 650px) {
            .card { width: 95%; }
            .user-info { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body class="dark">
<div class="container">
    <div class="header">
        <div class="logo">LinKey Comunitário</div>
        <div class="sub">Peça links, adicione notas e faça parte</div>
    </div>

    <div class="user-info" id="userInfo">
        <span class="user-email" id="userEmail">Carregando...</span>
        <div>
            <button id="loginBtn" onclick="abrirLogin()">🔐 Entrar</button>
            <button id="logoutBtn" class="logout-btn" style="display:none" onclick="fazerLogout()">🚪 Sair</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('links')">🔗 Links</button>
        <button class="tab-btn" onclick="mudarAba('pedidos')">📝 Pedidos</button>
        <button class="tab-btn admin-only" id="adminTabBtn" style="display:none" onclick="mudarAba('admin')">⚙️ Admin</button>
    </div>

    <div id="tabLinks" class="tab-content">
        <div class="toolbar">
            <select id="sortSelect" class="sort-select" onchange="aplicarOrdenacao()">
                <option value="nome">Ordenar por Nome</option>
                <option value="cliques">Mais acessados</option>
                <option value="data">Mais recentes</option>
            </select>
        </div>

        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Pesquisar links...">
                <button class="clear-search" id="clearSearchBtn">✖</button>
            </div>
            <div class="result-stats" id="resultStats"></div>
        </div>

        <div id="galleryContainer" class="gallery">
            <div class="no-results">Carregando links...</div>
        </div>
    </div>

    <div id="tabPedidos" class="tab-content" style="display:none">
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="abrirPedidoModal()" class="tool-btn">📝 + Fazer novo pedido</button>
        </div>
        <div id="pedidosContainer" class="gallery">
            <div class="no-results">Carregando pedidos...</div>
        </div>
    </div>

    <div id="tabAdmin" class="tab-content" style="display:none">
        <div id="adminPanel"></div>
    </div>

    <div class="footer">
        LinKey - Última atualização: <span id="ultimaAtualizacao"></span>
    </div>
</div>

<button class="theme-btn" onclick="alternarTema()">🌓 Tema</button>

<!-- Modais -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🔐 Entrar ou Criar Conta</h2>
            <span class="close" onclick="fecharModal('loginModal')">&times;</span>
        </div>
        <div id="loginContent">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="loginSenha" placeholder="mínimo 6 caracteres">
            </div>
            <button onclick="fazerLogin()">Entrar</button>
            <button onclick="criarConta()" style="background: #10b981">Criar Conta</button>
        </div>
    </div>
</div>

<div id="pedidoModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📝 Sugerir novo link</h2>
            <span class="close" onclick="fecharModal('pedidoModal')">&times;</span>
        </div>
        <div class="form-group">
            <label>Nome do link:</label>
            <input type="text" id="pedidoNome" placeholder="Ex: Site Incrível">
        </div>
        <div class="form-group">
            <label>URL:</label>
            <input type="text" id="pedidoUrl" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Por que esse link é útil? (opcional):</label>
            <textarea id="pedidoMotivo" rows="3" placeholder="Explique..."></textarea>
        </div>
        <button onclick="enviarPedido()">📤 Enviar pedido</button>
    </div>
</div>

<div id="confirmModal" class="modal" style="z-index: 3000;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h3 id="confirmMsg">Tem certeza?</h3>
        <div style="margin-top: 20px;">
            <button id="confirmYes" style="background: #dc2626;">Confirmar</button>
            <button id="confirmNo" style="background: #6b7280;">Cancelar</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBxnecJ2b1MQyDNA6JDqcardi0TfPGnZKY",
        authDomain: "linkey-f167c.firebaseapp.com",
        projectId: "linkey-f167c",
        storageBucket: "linkey-f167c.firebasestorage.app",
        messagingSenderId: "120200149024",
        appId: "1:120200149024:web:88cb5d5d0fb814df67a445",
        measurementId: "G-36TREE8R23"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let todosLinks = [];
    let usuarioAtual = null;
    let abaAtual = "links";
    let ordenacaoAtual = "nome";
    let pendingAction = null;
    
    const SENHA_ADMIN = "linkey123";
    let adminLogado = false;
    
    // ========== AUTENTICAÇÃO ==========
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            usuarioAtual = user;
            document.getElementById("userEmail").innerHTML = `👤 ${user.email} ${user.emailVerified ? '✅' : '⏳ Verificar email'}`;
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("logoutBtn").style.display = "inline-block";
            
            if(!user.emailVerified) {
                alert("⚠️ Verifique seu email! Enviamos um link de confirmação.");
                await user.sendEmailVerification();
            }
            
            // Verificar se é admin (email específico ou senha)
            const isAdmin = user.email === "admin@linkey.com" || localStorage.getItem("adminTemp") === "true";
            if(isAdmin) {
                adminLogado = true;
                document.getElementById("adminTabBtn").style.display = "inline-block";
            }
        } else {
            usuarioAtual = null;
            adminLogado = false;
            document.getElementById("userEmail").innerHTML = "👤 Desconectado";
            document.getElementById("loginBtn").style.display = "inline-block";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("adminTabBtn").style.display = "none";
            if(abaAtual === "admin") mudarAba("links");
        }
        await carregarLinks();
        await carregarPedidos();
    });
    
    function abrirLogin() {
        document.getElementById("loginModal").style.display = "block";
    }
    
    async function fazerLogin() {
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;
        try {
            await auth.signInWithEmailAndPassword(email, senha);
            fecharModal("loginModal");
            alert("✅ Login realizado!");
        } catch(erro) {
            alert("❌ Erro: " + erro.message);
        }
    }
    
    async function criarConta() {
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, senha);
            await userCred.user.sendEmailVerification();
            alert("✅ Conta criada! Verifique seu email para ativar.");
        } catch(erro) {
            alert("❌ Erro: " + erro.message);
        }
    }
    
    async function fazerLogout() {
        await auth.signOut();
        alert("✅ Deslogado!");
    }
    
    // ========== PEDIDOS ==========
    async function carregarPedidos() {
        try {
            const snapshot = await db.collection("pedidos").orderBy("data", "desc").get();
            const container = document.getElementById("pedidosContainer");
            if(snapshot.empty) {
                container.innerHTML = '<div class="no-results">📭 Nenhum pedido ainda. Seja o primeiro!</div>';
                return;
            }
            
            let html = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                const podeAprovar = adminLogado && p.status === "pendente";
                html += `
                    <div class="pedido-card">
                        <strong>🔗 ${escapeHtml(p.nome)}</strong><br>
                        <small>📎 ${escapeHtml(p.url)}</small>
                        <div class="link-note" style="margin-top:8px">💬 ${escapeHtml(p.motivo || "Sem justificativa")}</div>
                        <div class="pedido-status status-${p.status}">${p.status === "pendente" ? "⏳ Pendente" : p.status === "aprovado" ? "✅ Aprovado" : "❌ Recusado"}</div>
                        <small style="color:#6a7c9f">👤 ${escapeHtml(p.email)} | ${new Date(p.data).toLocaleDateString()}</small>
                        ${podeAprovar ? `
                            <div class="admin-actions">
                                <button onclick="aprovarPedido('${doc.id}', '${escapeHtml(p.nome)}', '${escapeHtml(p.url)}')" style="background:#10b981">✅ Aprovar</button>
                                <button onclick="recusarPedido('${doc.id}')" style="background:#ef4444">❌ Recusar</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch(e) {
            console.error(e);
        }
    }
    
    async function abrirPedidoModal() {
        if(!usuarioAtual) {
            alert("⚠️ Você precisa estar logado para fazer um pedido!");
            abrirLogin();
            return;
        }
        document.getElementById("pedidoModal").style.display = "block";
    }
    
    async function enviarPedido() {
        const nome = document.getElementById("pedidoNome").value.trim();
        const url = document.getElementById("pedidoUrl").value.trim();
        const motivo = document.getElementById("pedidoMotivo").value.trim();
        
        if(!nome || !url) {
            alert("❌ Nome e URL são obrigatórios!");
            return;
        }
        
        await db.collection("pedidos").add({
            nome: nome,
            url: url,
            motivo: motivo,
            email: usuarioAtual.email,
            status: "pendente",
            data: new Date().toISOString()
        });
        
        alert("✅ Pedido enviado! Aguarde aprovação do admin.");
        fecharModal("pedidoModal");
        document.getElementById("pedidoNome").value = "";
        document.getElementById("pedidoUrl").value = "";
        document.getElementById("pedidoMotivo").value = "";
        await carregarPedidos();
    }
    
    async function aprovarPedido(id, nome, url) {
        // Adicionar aos links
        await db.collection("links").add({
            nome: nome,
            url: url,
            imagem: "https://via.placeholder.com/200x150?text=Link",
            cliques: 0,
            nota: "Aprovado por pedido da comunidade",
            dataCriacao: new Date().toISOString()
        });
        
        // Atualizar status do pedido
        await db.collection("pedidos").doc(id).update({ status: "aprovado" });
        
        alert("✅ Pedido aprovado e adicionado aos links!");
        await carregarLinks();
        await carregarPedidos();
    }
    
    async function recusarPedido(id) {
        await db.collection("pedidos").doc(id).update({ status: "recusado" });
        alert("❌ Pedido recusado.");
        await carregarPedidos();
    }
    
    // ========== LINKS COM NOTAS ==========
    async function carregarLinks() {
        try {
            const snapshot = await db.collection("links").orderBy("nome").get();
            todosLinks = [];
            snapshot.forEach(doc => {
                todosLinks.push({
                    id: doc.id,
                    ...doc.data(),
                    cliques: doc.data().cliques || 0,
                    nota: doc.data().nota || "",
                    dataCriacao: doc.data().dataCriacao || new Date().toISOString()
                });
            });
            
            if(todosLinks.length === 0) {
                await criarLinksExemplo();
                await carregarLinks();
            } else {
                aplicarOrdenacao();
            }
        } catch(erro) {
            document.getElementById("galleryContainer").innerHTML = '<div class="no-results">❌ Erro ao carregar links.</div>';
        }
    }
    
    async function criarLinksExemplo() {
        const exemplos = [
            { nome: "GitHub", url: "https://github.com", imagem: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png", nota: "Repositórios e código aberto" },
            { nome: "Google", url: "https://google.com", imagem: "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png", nota: "O melhor buscador" },
            { nome: "Wikipedia", url: "https://wikipedia.org", imagem: "https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png", nota: "Enciclopédia livre" }
        ];
        
        for(let item of exemplos) {
            await db.collection("links").add({
                ...item,
                cliques: 0,
                dataCriacao: new Date().toISOString()
            });
        }
    }
    
    function aplicarOrdenacao() {
        ordenacaoAtual = document.getElementById("sortSelect").value;
        let linksFiltrados = [...todosLinks];
        
        if(ordenacaoAtual === "nome") {
            linksFiltrados.sort((a,b) => a.nome.localeCompare(b.nome));
        } else if(ordenacaoAtual === "cliques") {
            linksFiltrados.sort((a,b) => b.cliques - a.cliques);
        } else if(ordenacaoAtual === "data") {
            linksFiltrados.sort((a,b) => new Date(b.dataCriacao) - new Date(a.dataCriacao));
        }
        
        renderizarGaleria(linksFiltrados, document.getElementById("searchInput").value);
    }
    
    async function contarClique(id) {
        const link = todosLinks.find(l => l.id === id);
        if(link) {
            const novosCliques = (link.cliques || 0) + 1;
            await db.collection("links").doc(id).update({ cliques: novosCliques });
            link.cliques = novosCliques;
            aplicarOrdenacao();
        }
    }
    
    function renderizarGaleria(links, busca) {
        const container = document.getElementById("galleryContainer");
        const statsDiv = document.getElementById("resultStats");
        const termo = busca.toLowerCase().trim();
        
        let filtrados = links;
        if(termo !== "") {
            filtrados = links.filter(link => link.nome.toLowerCase().includes(termo));
        }
        
        const maxCliques = Math.max(...filtrados.map(l => l.cliques), 0);
        
        statsDiv.innerHTML = `${filtrados.length} link${filtrados.length !== 1 ? 's' : ''} encontrado${termo !== "" ? ` para "${busca}"` : ""}`;
        
        if(filtrados.length === 0) {
            container.innerHTML = '<div class="no-results">🔎 Nenhum link encontrado.</div>';
            return;
        }
        
        let html = "";
        for(let link of filtrados) {
            const ehHot = link.cliques === maxCliques && maxCliques > 0;
            html += `
                <div class="card">
                    ${ehHot ? '<div class="hot-badge">🔥 Mais clicado</div>' : ''}
                    <div class="card-img">
                        <img src="${link.imagem}" alt="${link.nome}" onerror="this.onerror=null; this.style.display='none'; this.parentNode.innerHTML += '<span class=fallback-icon>🖼️</span>'">
                    </div>
                    <div class="card-content">
                        <div class="link-name">${escapeHtml(link.nome)}</div>
                        ${link.nota ? `<div class="link-note">📝 ${escapeHtml(link.nota)}</div>` : ''}
                        <div class="link-cliques">👁️ ${link.cliques || 0} cliques</div>
                        <div class="card-buttons">
                            <button class="download-btn" onclick="window.open('${link.url}', '_blank'); contarClique('${link.id}')">⬇️ Acessar</button>
                            <button class="share-btn" onclick="compartilharLink('${link.url}', '${link.nome}')">🔗 Compartilhar</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        atualizarDataRodape();
    }
    
    function compartilharLink(url, nome) {
        if(navigator.share) {
            navigator.share({ title: nome, url: url });
        } else {
            navigator.clipboard.writeText(url);
            alert(`🔗 Link "${nome}" copiado!`);
        }
    }
    
    // ========== ADMIN ==========
    async function mostrarAdminPanel() {
        const container = document.getElementById("adminPanel");
        if(!adminLogado) {
            container.innerHTML = `
                <div style="text-align:center;padding:20px">
                    <h3>🔐 Acesso Admin</h3>
                    <input type="password" id="adminSenha" placeholder="Senha master" style="padding:10px;margin:10px">
                    <button onclick="validarAdmin()">Entrar</button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="form-group">
                <h3>➕ Adicionar link (com nota)</h3>
                <label>Nome:</label>
                <input type="text" id="novoNome">
                <label>URL:</label>
                <input type="text" id="novaUrl">
                <label>Imagem URL:</label>
                <input type="text" id="novaImagem">
                <label>Nota/Descrição:</label>
                <textarea id="novaNota" rows="2" placeholder="Uma breve descrição..."></textarea>
                <button onclick="adicionarLinkAdmin()">➕ Adicionar</button>
            </div>
            <hr>
            <h3>📋 Links (${todosLinks.length})</h3>
            <div id="listaLinksAdmin" class="link-list"></div>
        `;
        await listarLinksAdmin();
    }
    
    function validarAdmin() {
        const senha = document.getElementById("adminSenha").value;
        if(senha === SENHA_ADMIN) {
            adminLogado = true;
            localStorage.setItem("adminTemp", "true");
            document.getElementById("adminTabBtn").style.display = "inline-block";
            mostrarAdminPanel();
        } else {
            alert("Senha incorreta!");
        }
    }
    
    async function listarLinksAdmin() {
        const listaDiv = document.getElementById("listaLinksAdmin");
        if(!listaDiv) return;
        let html = "";
        for(let link of todosLinks) {
            html += `
                <div class="link-item">
                    <div style="flex:1">
                        <strong>${escapeHtml(link.nome)}</strong><br>
                        <small>${link.cliques || 0} cliques | ${link.nota ? link.nota.substring(0,40) : "sem nota"}</small>
                    </div>
                    <div>
                        <button onclick="editarLinkAdmin('${link.id}')">✏️ Editar</button>
                        <button onclick="confirmarExclusao('${link.id}')" style="background:#dc2626">🗑️</button>
                    </div>
                </div>
            `;
        }
        listaDiv.innerHTML = html || "<p>Nenhum link.</p>";
    }
    
    async function adicionarLinkAdmin() {
        const nome = document.getElementById("novoNome").value.trim();
        const url = document.getElementById("novaUrl").value.trim();
        let imagem = document.getElementById("novaImagem").value.trim();
        const nota = document.getElementById("novaNota").value.trim();
        
        if(!nome || !url) {
            alert("Nome e URL são obrigatórios!");
            return;
        }
        
        if(!imagem) imagem = "https://via.placeholder.com/200x150?text=Link";
        
        await db.collection("links").add({
            nome, url, imagem, nota,
            cliques: 0,
            dataCriacao: new Date().toISOString()
        });
        
        alert("Link adicionado!");
        document.getElementById("novoNome").value = "";
        document.getElementById("novaUrl").value = "";
        document.getElementById("novaImagem").value = "";
        document.getElementById("novaNota").value = "";
        await carregarLinks();
        await listarLinksAdmin();
    }
    
    async function editarLinkAdmin(id) {
        const link = todosLinks.find(l => l.id === id);
        const novoNome = prompt("Novo nome:", link.nome);
        if(!novoNome) return;
        const novaUrl = prompt("Nova URL:", link.url);
        if(!novaUrl) return;
        const novaNota = prompt("Nova nota/descrição:", link.nota || "");
        
        await db.collection("links").doc(id).update({
            nome: novoNome,
            url: novaUrl,
            nota: novaNota || ""
        });
        
        alert("Link atualizado!");
        await carregarLinks();
        await listarLinksAdmin();
    }
    
    async function confirmarExclusao(id) {
        pendingAction = id;
        document.getElementById("confirmModal").style.display = "block";
    }
    
    document.getElementById("confirmYes").onclick = async function() {
        if(pendingAction) {
            await db.collection("links").doc(pendingAction).delete();
            await carregarLinks();
            if(adminLogado) await listarLinksAdmin();
            pendingAction = null;
        }
        document.getElementById("confirmModal").style.display = "none";
    };
    
    document.getElementById("confirmNo").onclick = function() {
        pendingAction = null;
        document.getElementById("confirmModal").style.display = "none";
    };
    
    // ========== UTILITÁRIOS ==========
    function atualizarDataRodape() {
        document.getElementById("ultimaAtualizacao").innerHTML = new Date().toLocaleString('pt-BR');
    }
    
    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            return m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;";
        });
    }
    
    function mudarAba(aba) {
        abaAtual = aba;
        document.querySelectorAll(".tab-content").forEach(tab => tab.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        
        if(aba === "links") {
            document.getElementById("tabLinks").style.display = "block";
            document.querySelector(".tabs button:first-child").classList.add("active");
            aplicarOrdenacao();
        } else if(aba === "pedidos") {
            document.getElementById("tabPedidos").style.display = "block";
            document.querySelectorAll(".tabs button")[1].classList.add("active");
            carregarPedidos();
        } else if(aba === "admin") {
            document.getElementById("tabAdmin").style.display = "block";
            document.querySelectorAll(".tabs button")[2].classList.add("active");
            mostrarAdminPanel();
        }
    }
    
    function fecharModal(id) {
        document.getElementById(id).style.display = "none";
    }
    
    function alternarTema() {
        const body = document.body;
        if(body.classList.contains('dark')) {
            body.classList.remove('dark');
            body.classList.add('light');
            localStorage.setItem('tema', 'light');
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            localStorage.setItem('tema', 'dark');
        }
    }
    
    document.getElementById("searchInput").addEventListener("input", function(e) {
        aplicarOrdenacao();
        document.getElementById("clearSearchBtn").style.display = e.target.value ? "inline-block" : "none";
    });
    
    document.getElementById("clearSearchBtn").addEventListener("click", function() {
        document.getElementById("searchInput").value = "";
        aplicarOrdenacao();
        this.style.display = "none";
    });
    
    const temaSalvo = localStorage.getItem('tema');
    if(temaSalvo === 'light') document.body.classList.add('light');
    
    atualizarDataRodape();
</script>
</body>
</html>
