<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LinKey - Galeria de Links (ultra compatível)</title>
    <style>
        /* Estilos simples e compatíveis com navegadores antigos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px 15px;
            color: #eef2ff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #3b82f6;
            text-shadow: 2px 2px 0 #0a2a44;
            letter-spacing: -1px;
        }

        .sub {
            color: #8a9bcf;
            font-size: 14px;
            margin-top: 5px;
        }

        /* barra de pesquisa simples */
        .search-section {
            max-width: 500px;
            margin: 0 auto 30px auto;
        }

        .search-box {
            background: #111827;
            border: 1px solid #1e2a44;
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
        }

        .search-icon {
            color: #3b6cb0;
            font-size: 18px;
            margin-right: 8px;
        }

        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-size: 16px;
            color: white;
            outline: none;
            font-family: Arial, Helvetica, sans-serif;
        }

        #searchInput::placeholder {
            color: #6a7c9f;
        }

        .clear-search {
            background: #1e2a44;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 10px;
            border-radius: 30px;
            display: none;
        }

        .clear-search:hover {
            background: #2e4a7c;
        }

        .result-stats {
            text-align: center;
            font-size: 13px;
            color: #8e9ec2;
            margin-top: 10px;
        }

        /* grade de cards - fallback para grid antigo com float? Melhor usar display: inline-block com text-align */
        .gallery {
            text-align: center;
            font-size: 0; /* remove espaço inline-block */
        }

        .card {
            display: inline-block;
            vertical-align: top;
            width: 280px;
            margin: 12px;
            background: #0f1420;
            border-radius: 20px;
            border: 1px solid #1f2a46;
            text-align: left;
            font-size: 16px; /* reset */
            transition: all 0.2s;
        }

        .card:hover {
            background: #131a2a;
            border-color: #2e4a7c;
        }

        /* área da imagem */
        .card-img {
            width: 100%;
            height: 170px;
            background: #080c14;
            overflow: hidden;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .fallback-icon {
            display: inline-block;
            font-size: 48px;
            color: #3b6cb0;
            line-height: 170px;
        }

        /* conteúdo */
        .card-content {
            padding: 14px 12px 18px 12px;
        }

        .link-name {
            font-size: 18px;
            font-weight: bold;
            color: #eef3ff;
            margin-bottom: 14px;
            word-break: break-word;
        }

        .download-btn {
            display: block;
            width: 100%;
            background: #0f2b4f;
            border: 1px solid #2a4870;
            color: #c7e2ff;
            text-align: center;
            padding: 10px 0;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
            transition: 0.1s linear;
            text-decoration: none;
        }

        .download-btn:hover {
            background: #1e3e64;
            color: white;
            border-color: #3f74ae;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: #0c1120;
            border-radius: 30px;
            color: #98a9cf;
            font-size: 16px;
            border: 1px dashed #2a3a60;
            margin: 20px;
            display: inline-block;
            width: 90%;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #3e506e;
            margin-top: 40px;
            padding: 15px;
            border-top: 1px solid #1a2335;
        }

        /* responsivo básico */
        @media (max-width: 650px) {
            .card {
                width: 90%;
                margin: 12px auto;
                display: block;
            }
            .gallery {
                text-align: center;
            }
            .logo {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">LinKey</div>
        <div class="sub">Galeria de links · acesse e baixe com facilidade</div>
    </div>

    <div class="search-section">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Pesquisar por nome do link...">
            <button class="clear-search" id="clearSearchBtn">✖</button>
        </div>
        <div class="result-stats" id="resultStats"></div>
    </div>

    <div id="galleryContainer" class="gallery">
        <!-- os cards serão inseridos via javascript puro -->
    </div>

    <div class="footer">
        LinKey — Clique em "Baixar / Acessar" para ser redirecionado
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // BASE DE LINKS (IMAGEM + NOME + URL DE REDIRECIONAMENTO)
    // Compatível com navegadores antigos, sem arrow functions e let/const (usando var)
    // ------------------------------------------------------------
    var linksData = [
        {
            nome: "GitHub Oficial",
            url: "https://github.com",
            imagem: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
        },
        {
            nome: "Unsplash - Fotos Grátis",
            url: "https://unsplash.com",
            imagem: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400&h=250&fit=crop"
        },
        {
            nome: "Freepik Recursos",
            url: "https://www.freepik.com",
            imagem: "https://img.freepik.com/iconos-gratis/descargar_318-418870.jpg?w=200"
        },
        {
            nome: "Google Drive",
            url: "https://drive.google.com",
            imagem: "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png"
        },
        {
            nome: "Documentação React",
            url: "https://react.dev",
            imagem: "https://cdn.worldvectorlogo.com/logos/react-2.svg"
        },
        {
            nome: "Arquivo PDF Exemplo",
            url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf",
            imagem: "https://cdn-icons-png.flaticon.com/512/337/337946.png"
        },
        {
            nome: "Wikipedia",
            url: "https://www.wikipedia.org",
            imagem: "https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png"
        },
        {
            nome: "Arquivo ZIP Exemplo",
            url: "https://file-examples.com/storage/fe8c0e0e2e9a0e0e0e0e0e0/2017/10/file-example_ZIP_100kB.zip",
            imagem: "https://cdn-icons-png.flaticon.com/512/2920/2920233.png"
        }
    ];

    // Função para escapar HTML (proteção XSS)
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // fallback de imagem
    function handleImageError(imgElement) {
        imgElement.onerror = null; // evita loop
        imgElement.style.display = "none";
        var parent = imgElement.parentNode;
        var fallbackSpan = document.createElement("span");
        fallbackSpan.className = "fallback-icon";
        fallbackSpan.innerHTML = "🖼️";
        // limpar e adicionar fallback
        if (parent) {
            parent.appendChild(fallbackSpan);
        }
    }

    // função principal que renderiza a galeria baseada no termo de pesquisa
    function renderGallery(searchTerm) {
        var container = document.getElementById("galleryContainer");
        var statsDiv = document.getElementById("resultStats");
        var term = (typeof searchTerm === "string") ? searchTerm.trim().toLowerCase() : "";
        
        var filtered = [];
        // filtrar com laço tradicional para compatibilidade total
        for (var i = 0; i < linksData.length; i++) {
            var item = linksData[i];
            if (term === "") {
                filtered.push(item);
            } else {
                if (item.nome.toLowerCase().indexOf(term) !== -1) {
                    filtered.push(item);
                }
            }
        }
        
        var total = filtered.length;
        var totalOriginal = linksData.length;
        
        // exibir estatísticas
        if (term === "") {
            statsDiv.innerHTML = total + " link" + (total !== 1 ? "s" : "") + " disponível";
        } else {
            statsDiv.innerHTML = total + " resultado" + (total !== 1 ? "s" : "") + " para \"" + escapeHtml(term) + "\" (de " + totalOriginal + ")";
        }
        
        // se não tiver resultados
        if (total === 0) {
            container.innerHTML = '<div class="no-results">🔎 Nenhum link encontrado. Tente outro nome.</div>';
            return;
        }
        
        // construir os cards manualmente com string (melhor performance e compatível)
        var html = "";
        for (var j = 0; j < filtered.length; j++) {
            var link = filtered[j];
            var nomeSeguro = escapeHtml(link.nome);
            var urlSegura = escapeHtml(link.url);
            var imgSrc = escapeHtml(link.imagem);
            
            html += '<div class="card">';
            html += '<div class="card-img">';
            html += '<img src="' + imgSrc + '" alt="' + nomeSeguro + '" onerror="handleImageError(this)">';
            html += '</div>';
            html += '<div class="card-content">';
            html += '<div class="link-name">' + nomeSeguro + '</div>';
            html += '<button class="download-btn" data-url="' + urlSegura + '">⬇️ Baixar / Acessar</button>';
            html += '</div>';
            html += '</div>';
        }
        
        container.innerHTML = html;
        
        // adicionar eventos aos botões (compatível com navegadores antigos)
        var botoes = document.querySelectorAll(".download-btn");
        for (var k = 0; k < botoes.length; k++) {
            botoes[k].addEventListener("click", function(e) {
                var url = this.getAttribute("data-url");
                if (url) {
                    window.open(url, "_blank");
                }
            });
        }
    }
    
    // configurar a pesquisa e o limpar
    function setupSearch() {
        var searchInput = document.getElementById("searchInput");
        var clearBtn = document.getElementById("clearSearchBtn");
        
        function update() {
            var query = searchInput.value;
            renderGallery(query);
            if (query.trim().length > 0) {
                clearBtn.style.display = "inline-block";
            } else {
                clearBtn.style.display = "none";
            }
        }
        
        // evento input funciona em navegadores antigos também (IE9+)
        if (searchInput.addEventListener) {
            searchInput.addEventListener("input", update);
        } else {
            searchInput.attachEvent("onpropertychange", update); // fallback extremo
        }
        
        clearBtn.addEventListener("click", function() {
            searchInput.value = "";
            update();
            searchInput.focus();
        });
        
        // inicializar
        update();
    }
    
    // tornar handleImageError acessível globalmente
    window.handleImageError = handleImageError;
    
    // iniciar quando o DOM estiver pronto (cross-browser)
    function ready(fn) {
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", fn);
        } else {
            fn();
        }
    }
    
    ready(function() {
        setupSearch();
    });
</script>
</body>
</html>
