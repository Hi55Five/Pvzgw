<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinKey - Galeria de Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Motiva Sans', 'Roboto', Arial, sans-serif;
            background: #1a1e26;
            color: #c6d4df;
            padding: 20px;
            min-height: 100vh;
        }

        /* Container principal */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Cabeçalho estilo Steam */
        .header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2f3a;
        }

        .logo {
            font-size: 42px;
            font-weight: 600;
            color: #66c0f4;
            letter-spacing: -0.5px;
            text-shadow: none;
        }

        .sub {
            font-size: 13px;
            color: #8f98a3;
            margin-top: 6px;
        }

        /* User info - estilo Steam */
        .user-info {
            background: #171a21;
            border-radius: 4px;
            padding: 10px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #2a2f3a;
        }

        .user-email {
            font-size: 13px;
            color: #8f98a3;
        }

        /* Botões estilo Steam */
        .login-btn, .logout-btn {
            background: #2a2f3a;
            border: none;
            padding: 6px 18px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.1s;
            color: #c6d4df;
        }

        .login-btn:hover, .logout-btn:hover {
            background: #66c0f4;
            color: #1a1e26;
        }

        /* Abas estilo Steam */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2f3a;
            padding-bottom: 0;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #8f98a3;
            transition: all 0.1s;
            border-radius: 3px 3px 0 0;
        }

        .tab-btn:hover {
            color: #66c0f4;
        }

        .tab-btn.active {
            color: #66c0f4;
            border-bottom: 2px solid #66c0f4;
        }

        /* Barra de ferramentas */
        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .sort-select {
            background: #171a21;
            border: 1px solid #2a2f3a;
            color: #c6d4df;
            padding: 6px 12px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Pesquisa */
        .search-section {
            max-width: 400px;
            margin: 0 auto 25px auto;
        }

        .search-box {
            background: #171a21;
            border: 1px solid #2a2f3a;
            border-radius: 3px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
        }

        .search-icon {
            color: #8f98a3;
            margin-right: 8px;
            font-size: 14px;
        }

        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 13px;
            outline: none;
            color: #c6d4df;
        }

        #searchInput::placeholder {
            color: #4a4f5a;
        }

        .clear-search {
            background: #2a2f3a;
            border: none;
            color: #c6d4df;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            display: none;
        }

        .clear-search:hover {
            background: #3a3f4a;
        }

        .result-stats {
            text-align: center;
            font-size: 11px;
            color: #8f98a3;
            margin-top: 8px;
        }

        /* Galeria - grid simples */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* Cards estilo Steam (simples, sem brilho) */
        .card {
            width: 280px;
            background: #171a21;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.1s;
            border: 1px solid #2a2f3a;
        }

        .card:hover {
            border-color: #66c0f4;
            transform: translateY(-2px);
        }

        .hot-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff6b6b;
            color: #1a1e26;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            z-index: 5;
        }

        .card-img {
            width: 100%;
            height: 140px;
            background: #0d0f14;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #2a2f3a;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fallback-icon {
            font-size: 40px;
            color: #4a4f5a;
        }

        .card-content {
            padding: 12px;
        }

        .link-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #c6d4df;
        }

        .link-note {
            font-size: 11px;
            color: #8f98a3;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .link-cliques {
            font-size: 10px;
            color: #4a4f5a;
            margin-bottom: 10px;
        }

        .card-buttons {
            display: flex;
            gap: 8px;
        }

        .download-btn, .share-btn {
            padding: 7px 0;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.1s;
            border: none;
            text-align: center;
        }

        .download-btn {
            flex: 2;
            background: #2a2f3a;
            color: #c6d4df;
        }

        .download-btn:hover {
            background: #66c0f4;
            color: #1a1e26;
        }

        .share-btn {
            flex: 1;
            background: #1e222a;
            color: #8f98a3;
        }

        .share-btn:hover {
            background: #3a3f4a;
            color: #c6d4df;
        }

        /* Pedidos estilo Steam */
        .pedido-card {
            background: #171a21;
            border: 1px solid #2a2f3a;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.1s;
        }

        .pedido-card:hover {
            border-color: #66c0f4;
        }

        .pedido-status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-pendente { background: #c98f2e; color: #1a1e26; }
        .status-aprovado { background: #4c9f4f; color: white; }
        .status-recusado { background: #a43a3a; color: white; }

        /* Modais estilo Steam */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #171a21;
            margin: 20px;
            padding: 25px;
            max-width: 450px;
            width: 90%;
            border-radius: 4px;
            border: 1px solid #2a2f3a;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2f3a;
        }

        .modal-header h2 {
            font-size: 18px;
            color: #66c0f4;
        }

        .close {
            cursor: pointer;
            font-size: 22px;
            color: #8f98a3;
        }

        .close:hover {
            color: #66c0f4;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 500;
            color: #8f98a3;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 8px 10px;
            background: #0d0f14;
            border: 1px solid #2a2f3a;
            border-radius: 3px;
            font-size: 13px;
            color: #c6d4df;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #66c0f4;
        }

        button {
            background: #2a2f3a;
            color: #c6d4df;
            border: none;
            padding: 8px 18px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.1s;
        }

        button:hover {
            background: #66c0f4;
            color: #1a1e26;
        }

        /* Admin panel */
        .link-list {
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
        }

        .link-item {
            background: #0d0f14;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2f3a;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #8f98a3;
        }

        hr {
            margin: 20px 0;
            border-color: #2a2f3a;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 15px;
            font-size: 10px;
            color: #4a4f5a;
            border-top: 1px solid #2a2f3a;
        }

        /* Tema claro (opcional, mantém coerência) */
        body.light {
            background: #e8eef2;
            color: #2c3e50;
        }

        body.light .card,
        body.light .user-info,
        body.light .search-box,
        body.light .pedido-card,
        body.light .modal-content {
            background: #ffffff;
            border-color: #d1d9e0;
        }

        body.light .link-name {
            color: #2c3e50;
        }

        body.light .download-btn {
            background: #e2e8f0;
            color: #2c3e50;
        }

        body.light .download-btn:hover {
            background: #66c0f4;
            color: white;
        }

        /* Botão tema flutuante */
        .theme-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #171a21;
            border: 1px solid #2a2f3a;
            color: #c6d4df;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            background: #66c0f4;
            color: #1a1e26;
        }

        /* Responsivo */
        @media (max-width: 680px) {
            body {
                padding: 12px;
            }
            .card {
                width: 100%;
                max-width: 320px;
            }
            .logo {
                font-size: 32px;
            }
            .user-info {
                flex-direction: column;
                text-align: center;
            }
            .tabs {
                gap: 0;
            }
            .tab-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body class="dark">
<div class="container">
    <div class="header">
        <div class="logo">LinKey</div>
        <div class="sub">sua galeria de links</div>
    </div>

    <div class="user-info" id="userInfo">
        <span class="user-email" id="userEmail">carregando...</span>
        <div>
            <button id="loginBtn" class="login-btn" onclick="abrirLogin()">entrar</button>
            <button id="logoutBtn" class="logout-btn" style="display:none" onclick="fazerLogout()">sair</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="mudarAba('links')">links</button>
        <button class="tab-btn" onclick="mudarAba('pedidos')">pedidos</button>
        <button class="tab-btn admin-only" id="adminTabBtn" style="display:none" onclick="mudarAba('admin')">admin</button>
    </div>

    <div id="tabLinks" class="tab-content">
        <div class="toolbar">
            <select id="sortSelect" class="sort-select" onchange="aplicarOrdenacao()">
                <option value="nome">ordenar por nome</option>
                <option value="cliques">mais acessados</option>
                <option value="data">mais recentes</option>
            </select>
        </div>

        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="buscar link...">
                <button class="clear-search" id="clearSearchBtn">✖</button>
            </div>
            <div class="result-stats" id="resultStats"></div>
        </div>

        <div id="galleryContainer" class="gallery">
            <div class="no-results">carregando links...</div>
        </div>
    </div>

    <div id="tabPedidos" class="tab-content" style="display:none">
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="abrirPedidoModal()">+ fazer pedido</button>
        </div>
        <div id="pedidosContainer" class="gallery">
            <div class="no-results">carregando pedidos...</div>
        </div>
    </div>

    <div id="tabAdmin" class="tab-content" style="display:none">
        <div id="adminPanel"></div>
    </div>

    <div class="footer">
        linKey · comunidade de links
    </div>
</div>

<button class="theme-btn" onclick="alternarTema()">🌓</button>

<!-- Modais -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>entrar</h2>
            <span class="close" onclick="fecharModal('loginModal')">&times;</span>
        </div>
        <div class="form-group">
            <label>email</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>senha</label>
            <input type="password" id="loginSenha" placeholder="mínimo 6 caracteres">
        </div>
        <button onclick="fazerLogin()">entrar</button>
        <button onclick="criarConta()" style="background:#4c9f4f; margin-left:8px;">criar conta</button>
    </div>
</div>

<div id="pedidoModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>sugerir link</h2>
            <span class="close" onclick="fecharModal('pedidoModal')">&times;</span>
        </div>
        <div class="form-group">
            <label>nome</label>
            <input type="text" id="pedidoNome" placeholder="ex: Site Incrível">
        </div>
        <div class="form-group">
            <label>url</label>
            <input type="text" id="pedidoUrl" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>por que esse link é útil?</label>
            <textarea id="pedidoMotivo" rows="2" placeholder="explique..."></textarea>
        </div>
        <button onclick="enviarPedido()">enviar pedido</button>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content" style="max-width: 350px; text-align: center;">
        <h3 style="margin-bottom: 20px;">tem certeza?</h3>
        <button id="confirmYes" style="background:#a43a3a;">excluir</button>
        <button id="confirmNo" style="background:#2a2f3a; margin-left:8px;">cancelar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBxnecJ2b1MQyDNA6JDqcardi0TfPGnZKY",
        authDomain: "linkey-f167c.firebaseapp.com",
        projectId: "linkey-f167c",
        storageBucket: "linkey-f167c.firebasestorage.app",
        messagingSenderId: "120200149024",
        appId: "1:120200149024:web:88cb5d5d0fb814df67a445",
        measurementId: "G-36TREE8R23"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let todosLinks = [];
    let usuarioAtual = null;
    let abaAtual = "links";
    let ordenacaoAtual = "nome";
    let pendingAction = null;
    
    const SENHA_ADMIN = "linkey123";
    let adminLogado = false;
    
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            usuarioAtual = user;
            document.getElementById("userEmail").innerHTML = `${user.email} ${user.emailVerified ? '✓' : '✗ verificar email'}`;
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("logoutBtn").style.display = "inline-block";
            
            if(!user.emailVerified) {
                alert("verifique seu email! enviamos um link.");
                await user.sendEmailVerification();
            }
            
            const isAdmin = user.email === "admin@linkey.com" || localStorage.getItem("adminTemp") === "true";
            if(isAdmin) {
                adminLogado = true;
                document.getElementById("adminTabBtn").style.display = "inline-block";
            }
        } else {
            usuarioAtual = null;
            adminLogado = false;
            document.getElementById("userEmail").innerHTML = "desconectado";
            document.getElementById("loginBtn").style.display = "inline-block";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("adminTabBtn").style.display = "none";
            if(abaAtual === "admin") mudarAba("links");
        }
        await carregarLinks();
        await carregarPedidos();
    });
    
    function abrirLogin() { document.getElementById("loginModal").style.display = "flex"; }
    function fecharModal(id) { document.getElementById(id).style.display = "none"; }
    
    async function fazerLogin() {
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;
        try {
            await auth.signInWithEmailAndPassword(email, senha);
            fecharModal("loginModal");
        } catch(erro) { alert("erro: " + erro.message); }
    }
    
    async function criarConta() {
        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, senha);
            await userCred.user.sendEmailVerification();
            alert("conta criada! verifique seu email.");
        } catch(erro) { alert("erro: " + erro.message); }
    }
    
    async function fazerLogout() { await auth.signOut(); }
    
    async function carregarPedidos() {
        try {
            const snapshot = await db.collection("pedidos").orderBy("data", "desc").get();
            const container = document.getElementById("pedidosContainer");
            if(snapshot.empty) { container.innerHTML = '<div class="no-results">nenhum pedido ainda.</div>'; return; }
            let html = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                const podeAprovar = adminLogado && p.status === "pendente";
                html += `
                    <div class="pedido-card">
                        <strong>${escapeHtml(p.nome)}</strong><br>
                        <small>${escapeHtml(p.url)}</small>
                        <div style="font-size:11px; margin-top:6px; color:#8f98a3">${escapeHtml(p.motivo || "sem justificativa")}</div>
                        <div class="pedido-status status-${p.status}">${p.status === "pendente" ? "pendente" : p.status === "aprovado" ? "aprovado" : "recusado"}</div>
                        <small style="color:#4a4f5a">${escapeHtml(p.email)} | ${new Date(p.data).toLocaleDateString()}</small>
                        ${podeAprovar ? `
                            <div style="margin-top:10px; display:flex; gap:8px;">
                                <button onclick="aprovarPedido('${doc.id}', '${escapeHtml(p.nome)}', '${escapeHtml(p.url)}')" style="background:#4c9f4f;">aprovar</button>
                                <button onclick="recusarPedido('${doc.id}')" style="background:#a43a3a;">recusar</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch(e) {}
    }
    
    function abrirPedidoModal() {
        if(!usuarioAtual) { alert("faça login primeiro!"); abrirLogin(); return; }
        document.getElementById("pedidoModal").style.display = "flex";
    }
    
    async function enviarPedido() {
        const nome = document.getElementById("pedidoNome").value.trim();
        const url = document.getElementById("pedidoUrl").value.trim();
        const motivo = document.getElementById("pedidoMotivo").value.trim();
        if(!nome || !url) { alert("nome e url obrigatórios!"); return; }
        await db.collection("pedidos").add({ nome, url, motivo, email: usuarioAtual.email, status: "pendente", data: new Date().toISOString() });
        alert("pedido enviado!");
        fecharModal("pedidoModal");
        document.getElementById("pedidoNome").value = "";
        document.getElementById("pedidoUrl").value = "";
        document.getElementById("pedidoMotivo").value = "";
        await carregarPedidos();
    }
    
    async function aprovarPedido(id, nome, url) {
        await db.collection("links").add({ nome, url, imagem: "https://via.placeholder.com/200x150?text=link", cliques: 0, nota: "aprovado pela comunidade", dataCriacao: new Date().toISOString() });
        await db.collection("pedidos").doc(id).update({ status: "aprovado" });
        alert("pedido aprovado!");
        await carregarLinks();
        await carregarPedidos();
    }
    
    async function recusarPedido(id) {
        await db.collection("pedidos").doc(id).update({ status: "recusado" });
        alert("pedido recusado.");
        await carregarPedidos();
    }
    
    async function carregarLinks() {
        try {
            const snapshot = await db.collection("links").orderBy("nome").get();
            todosLinks = [];
            snapshot.forEach(doc => {
                todosLinks.push({ id: doc.id, ...doc.data(), cliques: doc.data().cliques || 0, nota: doc.data().nota || "", dataCriacao: doc.data().dataCriacao || new Date().toISOString() });
            });
            if(todosLinks.length === 0) await criarLinksExemplo();
            aplicarOrdenacao();
        } catch(e) { document.getElementById("galleryContainer").innerHTML = '<div class="no-results">erro ao carregar links.</div>'; }
    }
    
    async function criarLinksExemplo() {
        const exemplos = [
            { nome: "GitHub", url: "https://github.com", imagem: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png", nota: "repositórios e código" },
            { nome: "Google", url: "https://google.com", imagem: "https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png", nota: "o melhor buscador" }
        ];
        for(let item of exemplos) await db.collection("links").add({ ...item, cliques: 0, dataCriacao: new Date().toISOString() });
    }
    
    function aplicarOrdenacao() {
        ordenacaoAtual = document.getElementById("sortSelect").value;
        let linksFiltrados = [...todosLinks];
        if(ordenacaoAtual === "nome") linksFiltrados.sort((a,b) => a.nome.localeCompare(b.nome));
        else if(ordenacaoAtual === "cliques") linksFiltrados.sort((a,b) => b.cliques - a.cliques);
        else if(ordenacaoAtual === "data") linksFiltrados.sort((a,b) => new Date(b.dataCriacao) - new Date(a.dataCriacao));
        renderizarGaleria(linksFiltrados, document.getElementById("searchInput").value);
    }
    
    async function contarClique(id) {
        const link = todosLinks.find(l => l.id === id);
        if(link) { await db.collection("links").doc(id).update({ cliques: (link.cliques || 0) + 1 }); link.cliques++; aplicarOrdenacao(); }
    }
    
    function renderizarGaleria(links, busca) {
        const container = document.getElementById("galleryContainer");
        const termo = busca.toLowerCase().trim();
        let filtrados = termo ? links.filter(l => l.nome.toLowerCase().includes(termo)) : links;
        const maxCliques = Math.max(...filtrados.map(l => l.cliques), 0);
        document.getElementById("resultStats").innerHTML = `${filtrados.length} link${filtrados.length !== 1 ? 's' : ''}`;
        if(filtrados.length === 0) { container.innerHTML = '<div class="no-results">nenhum link encontrado.</div>'; return; }
        let html = "";
        for(let link of filtrados) {
            const ehHot = link.cliques === maxCliques && maxCliques > 0;
            html += `
                <div class="card" style="position:relative">
                    ${ehHot ? '<div class="hot-badge">🔥</div>' : ''}
                    <div class="card-img"><img src="${link.imagem}" onerror="this.onerror=null;this.style.display='none';this.parentNode.innerHTML+='<span class=fallback-icon>🔗</span>'"></div>
                    <div class="card-content">
                        <div class="link-name">${escapeHtml(link.nome)}</div>
                        ${link.nota ? `<div class="link-note">${escapeHtml(link.nota)}</div>` : ''}
                        <div class="link-cliques">👁 ${link.cliques || 0}</div>
                        <div class="card-buttons">
                            <button class="download-btn" onclick="window.open('${link.url}', '_blank'); contarClique('${link.id}')">acessar</button>
                            <button class="share-btn" onclick="compartilharLink('${link.url}', '${link.nome}')">compartilhar</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function compartilharLink(url, nome) {
        if(navigator.share) navigator.share({ title: nome, url });
        else { navigator.clipboard.writeText(url); alert(`link "${nome}" copiado!`); }
    }
    
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"); }
    
    function mudarAba(aba) {
        abaAtual = aba;
        document.querySelectorAll(".tab-content").forEach(t => t.style.display = "none");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        if(aba === "links") { document.getElementById("tabLinks").style.display = "block"; document.querySelector(".tabs button:first-child").classList.add("active"); aplicarOrdenacao(); }
        else if(aba === "pedidos") { document.getElementById("tabPedidos").style.display = "block"; document.querySelectorAll(".tabs button")[1].classList.add("active"); carregarPedidos(); }
        else if(aba === "admin") { document.getElementById("tabAdmin").style.display = "block"; document.querySelectorAll(".tabs button")[2].classList.add("active"); mostrarAdminPanel(); }
    }
    
    async function mostrarAdminPanel() {
        const container = document.getElementById("adminPanel");
        if(!adminLogado) { container.innerHTML = `<div style="text-align:center;padding:30px"><input type="password" id="adminSenha" placeholder="senha master" style="padding:8px"><button onclick="validarAdmin()" style="margin-left:8px">entrar</button></div>`; return; }
        container.innerHTML = `
            <div class="form-group"><h3>adicionar link</h3>
            <label>nome</label><input type="text" id="novoNome">
            <label>url</label><input type="text" id="novaUrl">
            <label>imagem url</label><input type="text" id="novaImagem">
            <label>nota</label><textarea id="novaNota" rows="2"></textarea>
            <button onclick="adicionarLinkAdmin()">adicionar</button></div>
            <hr><h3>links (${todosLinks.length})</h3><div id="listaLinksAdmin" class="link-list"></div>`;
        await listarLinksAdmin();
    }
    
    function validarAdmin() { if(document.getElementById("adminSenha").value === SENHA_ADMIN) { adminLogado = true; localStorage.setItem("adminTemp","true"); document.getElementById("adminTabBtn").style.display="inline-block"; mostrarAdminPanel(); } else alert("senha incorreta!"); }
    
    async function listarLinksAdmin() {
        const div = document.getElementById("listaLinksAdmin");
        if(!div) return;
        let html = "";
        for(let link of todosLinks) html += `<div class="link-item"><div><strong>${escapeHtml(link.nome)}</strong><br><small>${link.cliques} cliques</small></div><div><button onclick="editarLinkAdmin('${link.id}')">editar</button><button onclick="confirmarExclusao('${link.id}')" style="background:#a43a3a">excluir</button></div></div>`;
        div.innerHTML = html;
    }
    
    async function adicionarLinkAdmin() {
        const nome = document.getElementById("novoNome").value.trim(), url = document.getElementById("novaUrl").value.trim();
        if(!nome || !url) { alert("nome e url obrigatórios!"); return; }
        await db.collection("links").add({ nome, url, imagem: document.getElementById("novaImagem").value.trim() || "https://via.placeholder.com/200x150?text=link", nota: document.getElementById("novaNota").value.trim(), cliques: 0, dataCriacao: new Date().toISOString() });
        alert("link adicionado!");
        document.getElementById("novoNome").value = ""; document.getElementById("novaUrl").value = ""; document.getElementById("novaImagem").value = ""; document.getElementById("novaNota").value = "";
        await carregarLinks(); await listarLinksAdmin();
    }
    
    async function editarLinkAdmin(id) {
        const link = todosLinks.find(l => l.id === id);
        const novoNome = prompt("novo nome:", link.nome); if(!novoNome) return;
        const novaUrl = prompt("nova url:", link.url); if(!novaUrl) return;
        const novaNota = prompt("nova nota:", link.nota || "");
        await db.collection("links").doc(id).update({ nome: novoNome, url: novaUrl, nota: novaNota || "" });
        alert("link atualizado!"); await carregarLinks(); await listarLinksAdmin();
    }
    
    function confirmarExclusao(id) { pendingAction = id; document.getElementById("confirmModal").style.display = "flex"; }
    document.getElementById("confirmYes").onclick = async function() { if(pendingAction) { await db.collection("links").doc(pendingAction).delete(); await carregarLinks(); if(adminLogado) await listarLinksAdmin(); pendingAction = null; } document.getElementById("confirmModal").style.display = "none"; };
    document.getElementById("confirmNo").onclick = function() { pendingAction = null; document.getElementById("confirmModal").style.display = "none"; };
    
    function alternarTema() {
        const body = document.body;
        if(body.classList.contains('dark')) { body.classList.remove('dark'); body.classList.add('light'); localStorage.setItem('tema','light'); }
        else { body.classList.remove('light'); body.classList.add('dark'); localStorage.setItem('tema','dark'); }
    }
    
    document.getElementById("searchInput").addEventListener("input", function(e) { aplicarOrdenacao(); document.getElementById("clearSearchBtn").style.display = e.target.value ? "inline-block" : "none"; });
    document.getElementById("clearSearchBtn").addEventListener("click", function() { document.getElementById("searchInput").value = ""; aplicarOrdenacao(); this.style.display = "none"; });
    
    if(localStorage.getItem('tema') === 'light') document.body.classList.add('light');
</script>
</body>
</html>
