<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinKey</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="dark">
    <div class="app-container">
      <header class="main-header">
        <div class="brand">
          <h1 class="logo">LinKey</h1>
        </div>

        <div class="search-wrapper">
          <span class="icon-search">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar na sua galeria..."
          />
          <button class="btn-clear" id="clearSearchBtn" title="Limpar busca">
            &times;
          </button>
        </div>

        <nav class="user-controls" id="userInfo">
          <span class="user-email" id="userEmail">carregando...</span>
          <div class="auth-buttons">
            <button id="loginBtn" class="btn-primary" onclick="abrirLogin()">
              entrar
            </button>
            <button id="logoutBtn" class="btn-outline" onclick="fazerLogout()">
              sair
            </button>
          </div>
        </nav>
      </header>
      <nav class="tabs-nav">
        <button class="tab-btn active" onclick="mudarAba('links')">
          links
        </button>
        <button
          class="tab-btn admin-only"
          id="adminTabBtn"
          onclick="window.location.href='admin.html'"
        >
          admin
        </button>
      </nav>

      <main class="content">
        <section id="tabLinks" class="tab-content">
          <div class="filter-bar">
            <select
              id="sortSelect"
              class="custom-select"
              onchange="aplicarOrdenacao()"
            >
              <option value="nome">Nome (A-Z)</option>
              <option value="cliques">Mais acessados</option>
              <option value="data">Mais recentes</option>
              <option value="estrelas">Melhor avaliados</option>
            </select>
          </div>

          <div id="resultStats" class="stats-text"></div>

          <div id="galleryContainer" class="gallery-grid">
            <div class="loader">Buscando seus links... <button onclick="carregarLinks()">tentar novamente</button></div>
          </div>
        </section>

        <section id="tabAdmin" class="tab-content hidden">
          <div id="adminPanel" class="admin-card"></div>
        </section>
      </main>

      <footer class="main-footer">
        <p>LinKey &copy; 2026 · Comunidade de Links</p>
      </footer>
    </div>

    <div id="loginModal" class="modal-overlay">
      <div class="modal-card">
        <header class="modal-header">
          <h2>Bem-vindo de volta</h2>
          <button class="btn-close" onclick="fecharModal('loginModal')">
            &times;
          </button>
        </header>
        <div class="modal-body">
          <div class="input-group">
            <label for="loginEmail">E-mail</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="exemplo@email.com"
            />
          </div>
          <div class="input-group">
            <label for="loginSenha">Senha</label>
            <input
              type="password"
              id="loginSenha"
              placeholder="No mínimo 6 caracteres"
            />
          </div>
          <div class="modal-footer">
            <button class="btn-confirm" onclick="fazerLogin()">Entrar</button>
            <button class="btn-secondary" onclick="criarConta()">
              Criar nova conta
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
      <div class="modal-card small-modal">
        <h3>Confirmar exclusão?</h3>
        <p>Essa ação não pode ser desfeita.</p>
        <div class="modal-actions">
          <button id="confirmYes" class="btn-danger">Excluir</button>
          <button
            id="confirmNo"
            class="btn-cancel"
            onclick="fecharModal('confirmModal')"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="javascript.js"></script>
  </body>
</html>
